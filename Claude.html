<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>廣義角三角比 — 互動式單位圓</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f0f2f5;}
body{font-family:'Microsoft JhengHei','微軟正黑體',sans-serif;color:#222;display:flex;flex-direction:column;}

#app{display:flex;flex-direction:column;height:100%;padding:7px 10px;gap:5px;overflow:hidden;}

/* ── Header ── */
header{flex:0 0 auto;text-align:center;}
header h1{font-size:15px;color:#1a1a6e;font-weight:700;letter-spacing:.3px;}
header p{font-size:10px;color:#bbb;margin-top:1px;}

/* ── Controls ── */
.controls{flex:0 0 auto;background:#fff;border-radius:8px;padding:6px 10px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.slider-row{display:flex;align-items:center;gap:7px;}
.slider-row label{font-size:11px;color:#888;white-space:nowrap;}
#slider{flex:1;height:4px;cursor:pointer;accent-color:#1a1a6e;min-width:0;}
#num-input{width:48px;text-align:center;border:1px solid #ccc;border-radius:5px;padding:3px 4px;font-size:12px;font-family:inherit;}
.btn-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:5px;}
.btn-row{display:flex;gap:4px;width:max-content;}
.btn-row button{font-size:11px;padding:3px 8px;border:1px solid #ccc;border-radius:14px;background:#fff;cursor:pointer;font-family:inherit;color:#555;white-space:nowrap;transition:all .12s;}
.btn-row button.active-btn{background:#1a1a6e;color:#fff;border-color:#1a1a6e;}

/* ── Main ── */
.main{flex:1;display:flex;gap:8px;min-height:0;overflow:hidden;}

/* Mobile: stack */
@media(max-width:899px){
  .main{flex-direction:column;}
  .circle-panel{flex:0 0 auto;display:flex;justify-content:center;}
  #svg{width:auto;max-width:100%;display:block;}
  .info-panel{flex:1;min-height:0;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
}
/* Desktop: side by side */
@media(min-width:900px){
  .circle-panel{flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  #svg{height:clamp(350px,50vh,480px);width:auto;}
  .info-panel{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;overflow:hidden;}
  header h1{font-size:18px;}
  .controls{padding:8px 12px;}
  .btn-row button{font-size:12px;padding:4px 10px;}
}

/* SVG interaction */
#svg{cursor:crosshair;touch-action:none;border-radius:8px;background:#fff;filter:drop-shadow(0 1px 5px rgba(0,0,0,.1));}
#svg:active{cursor:grabbing;}

/* ── Info panel items ── */
.angle-bar{flex:0 0 auto;background:#1a1a6e;color:#fff;border-radius:8px;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;}
.angle-bar .big{font-size:28px;font-weight:700;letter-spacing:1px;line-height:1.1;}
.angle-bar .lbl{font-size:10px;opacity:.6;margin-top:1px;}
.angle-bar .phi-side{text-align:right;}

.quad-row{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.quad-box{border-radius:6px;padding:4px 2px;text-align:center;font-size:9.5px;font-weight:700;border:2px solid transparent;transition:all .15s;}
.quad-box .qn{font-size:12px;line-height:1.3;}
.quad-box.q1{background:#fffde7;color:#f57f17;}
.quad-box.q2{background:#e8f5e9;color:#2e7d32;}
.quad-box.q3{background:#e8eaf6;color:#283593;}
.quad-box.q4{background:#fce4ec;color:#880e4f;}
.quad-box.active{border-color:#333;box-shadow:0 1px 5px rgba(0,0,0,.14);transform:scale(1.05);}

/* type toggle */
.toggle-row{flex:0 0 auto;display:flex;gap:0;background:#e8e8e8;border-radius:7px;padding:2px;}
.tbtn{flex:1;font-size:11px;padding:4px;border:none;border-radius:5px;background:transparent;color:#666;cursor:pointer;font-family:inherit;font-weight:600;transition:all .12s;}
.tbtn.active{background:#1a1a6e;color:#fff;}

.ref-box{flex:0 0 auto;background:#fff;border:1px solid #e0e0e0;border-radius:7px;padding:5px 10px;}
.ref-row{display:flex;justify-content:space-between;align-items:center;gap:4px;font-size:11.5px;padding:2px 0;border-bottom:1px solid #f3f3f3;}
.ref-row:last-child{border-bottom:none;}
.ref-lk{color:#999;}
.ref-rv{font-weight:700;color:#1a1a6e;font-size:11.5px;text-align:right;}
.badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap;}
.be{background:#e3f2fd;color:#1565c0;}
.bo{background:#fce4ec;color:#880e4f;}
.bb{background:#e8f5e9;color:#2e7d32;}

/* ── Formula grid ── */
.formula-box{flex:1;min-height:0;background:#fff;border:1px solid #e0e0e0;border-radius:7px;padding:6px 10px;display:flex;flex-direction:column;}
.box-title{font-size:10px;color:#bbb;margin-bottom:4px;letter-spacing:.3px;flex:0 0 auto;}
.frows{flex:1;display:flex;flex-direction:column;justify-content:space-around;}

/* Each row: grid with 5 columns */
.fg{display:grid;grid-template-columns:auto 14px 1fr auto auto;align-items:center;column-gap:4px;padding:3px 0;border-bottom:1px solid #f5f5f5;font-size:12px;}
.fg:last-child{border-bottom:none;}
.fg-name{color:#555;white-space:nowrap;}
.fg-eq{color:#ccc;text-align:center;}
.fg-formula{color:#1565c0;font-weight:600;font-size:12px;}
.fg-sign{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:13px;font-weight:900;flex-shrink:0;}
.sp{background:#e8f5e9;color:#1b5e20;}   /* positive: green */
.sn{background:#ffebee;color:#b71c1c;}   /* negative: red */
.vp{color:#1b5e20;font-weight:700;font-size:13px;}
.vn{color:#b71c1c;font-weight:700;font-size:13px;}
.ve{color:#999;font-size:10px;margin-left:2px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>廣義角三角比 — 互動式單位圓</h1>
    <p>拖曳 P 點 或 滑動滑桿 改變角度</p>
  </header>

  <div class="main">
    <!-- ── Circle ── -->
    <div class="circle-panel">
      <svg id="svg" viewBox="0 0 440 440" preserveAspectRatio="xMidYMid meet">
        <path d="M220 220 L380 220 A160 160 0 0 0 220 60 Z" fill="rgba(255,253,220,.5)"/>
        <path d="M220 220 L220 60 A160 160 0 0 0 60 220 Z" fill="rgba(220,245,220,.5)"/>
        <path d="M220 220 L60 220 A160 160 0 0 0 220 380 Z" fill="rgba(220,225,245,.5)"/>
        <path d="M220 220 L220 380 A160 160 0 0 0 380 220 Z" fill="rgba(255,224,235,.5)"/>
        <text x="385" y="214" font-size="11" fill="#ccc">1</text>
        <text x="44" y="214" font-size="11" fill="#ccc" text-anchor="end">−1</text>
        <text x="224" y="56" font-size="11" fill="#ccc">1</text>
        <text x="224" y="396" font-size="11" fill="#ccc">−1</text>
        <circle cx="220" cy="220" r="160" fill="none" stroke="#ddd" stroke-width="1.2" stroke-dasharray="4,4"/>
        <line x1="22" y1="220" x2="415" y2="220" stroke="#444" stroke-width="1.8"/>
        <line x1="220" y1="22" x2="220" y2="415" stroke="#444" stroke-width="1.8"/>
        <polygon points="415,220 408,215 408,225" fill="#444"/>
        <polygon points="220,22 215,29 225,29" fill="#444"/>
        <text x="418" y="224" font-size="14" fill="#333" font-style="italic">x</text>
        <text x="215" y="17" font-size="14" fill="#333" font-style="italic">y</text>
        <text x="226" y="236" font-size="12" fill="#777">O</text>
        <text x="316" y="114" font-size="12" fill="#c8a000" font-weight="bold" opacity=".4">I</text>
        <text x="115" y="114" font-size="12" fill="#2e7d32" font-weight="bold" opacity=".4">II</text>
        <text x="110" y="336" font-size="12" fill="#283593" font-weight="bold" opacity=".4">III</text>
        <text x="316" y="336" font-size="12" fill="#880e4f" font-weight="bold" opacity=".4">IV</text>
        <!-- dynamic -->
        <path id="arc" fill="none" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
        <line id="tri-op" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="7,4"/>
        <line id="tri-pf" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="7,4"/>
        <path id="ra-mark" fill="none" stroke="#1565c0" stroke-width="1.6"/>
        <text id="lbl-phi" font-size="14" fill="#1565c0" font-style="italic">φ</text>
        <text id="lbl-theta" font-size="14" fill="#e53935" font-style="italic">θ</text>
        <!-- large invisible hit area around P for easy drag -->
        <circle id="pt-hit" r="20" fill="transparent" style="cursor:grab;"/>
        <circle id="pt-p" r="7" fill="#1565c0" stroke="#fff" stroke-width="2.5" style="pointer-events:none;"/>
        <text id="lbl-p" font-size="12" fill="#1565c0" font-weight="bold" pointer-events="none">P</text>
      </svg>
    </div>

    <!-- ── Info ── -->
    <div class="info-panel">
      <div class="angle-bar">
        <div>
          <div class="big" id="disp-theta">45°</div>
          <div class="lbl">目前角度 θ</div>
        </div>
        <div class="phi-side">
          <div class="lbl">參考角 φ</div>
          <div class="big" id="disp-phi">45°</div>
        </div>
      </div>

      <div class="quad-row">
        <div class="quad-box q1" id="qbox1"><div class="qn">I</div>第一象限</div>
        <div class="quad-box q2" id="qbox2"><div class="qn">II</div>第二象限</div>
        <div class="quad-box q3" id="qbox3"><div class="qn">III</div>第三象限</div>
        <div class="quad-box q4" id="qbox4"><div class="qn">IV</div>第四象限</div>
      </div>

      <div class="toggle-row">
        <button class="tbtn active" id="tbtn-even" onclick="setFT('even')">偶數型（sin/cos不換）</button>
        <button class="tbtn" id="tbtn-odd" onclick="setFT('odd')">奇數型（sin↔cos互換）</button>
      </div>

      <div class="ref-box">
        <div class="ref-row">
          <span class="ref-lk">公式類型</span>
          <span id="disp-type"><span class="badge bb">銳角（基本）</span></span>
        </div>
        <div class="ref-row">
          <span class="ref-lk">對應公式</span>
          <span class="ref-rv" id="disp-fml">θ = φ = 45°</span>
        </div>
      </div>

      <div class="formula-box">
        <div class="box-title">三角函數值</div>
        <div class="frows">
          <div class="fg">
            <span class="fg-name" id="fl-sin">sin(45°)</span>
            <span class="fg-eq">=</span>
            <span class="fg-formula" id="ff-sin">sin(45°)</span>
            <span class="fg-sign sp" id="fs-sin">＋</span>
            <span><span class="vp" id="fv-sin">0.707</span><span class="ve" id="fe-sin">√2/2</span></span>
          </div>
          <div class="fg">
            <span class="fg-name" id="fl-cos">cos(45°)</span>
            <span class="fg-eq">=</span>
            <span class="fg-formula" id="ff-cos">cos(45°)</span>
            <span class="fg-sign sp" id="fs-cos">＋</span>
            <span><span class="vp" id="fv-cos">0.707</span><span class="ve" id="fe-cos">√2/2</span></span>
          </div>
          <div class="fg">
            <span class="fg-name" id="fl-tan">tan(45°)</span>
            <span class="fg-eq">=</span>
            <span class="fg-formula" id="ff-tan">tan(45°)</span>
            <span class="fg-sign sp" id="fs-tan">＋</span>
            <span><span class="vp" id="fv-tan">1.000</span><span class="ve" id="fe-tan">= 1</span></span>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /main -->

  <!-- Controls at bottom -->
  <div class="controls">
    <div class="slider-row">
      <label>θ：</label>
      <input type="range" id="slider" min="0" max="360" step="1" value="45" oninput="syncS(this.value)">
      <input type="number" id="num-input" min="0" max="360" value="45" oninput="syncI(this.value)">
      <span style="font-size:12px;color:#888;">°</span>
    </div>
    <div class="btn-wrap"><div class="btn-row" id="btn-row"></div></div>
  </div>
</div><!-- /app -->

<script>
// ── Set height via JS to handle mobile browser chrome ──
function setH(){document.getElementById('app').style.height=window.innerHeight+'px';}
setH(); window.addEventListener('resize',setH);

// ── Set SVG height based on available space (mobile) ──
function setSvgSize(){
  if(window.innerWidth>=900)return;
  const app=document.getElementById('app');
  // Estimate non-svg vertical space
  const nonSvg=app.querySelectorAll(':scope > *:not(.main)');
  let usedH=0;
  nonSvg.forEach(el=>usedH+=el.offsetHeight+5);
  const infoH=140; // approximate info panel min height
  const available=window.innerHeight-usedH-infoH-30;
  const sz=Math.max(160,Math.min(available,300));
  document.getElementById('svg').style.height=sz+'px';
}
window.addEventListener('load',setSvgSize);
window.addEventListener('resize',setSvgSize);

const CX=220,CY=220,R=160,S=9;
let fType='even', curDeg=45, dragging=false;

// ── Exact fraction lookup (absolute values) ──
const ABS={
  0:{s:'0',c:'1',t:'0'},
  30:{s:'1/2',c:'√3/2',t:'√3/3'},
  45:{s:'√2/2',c:'√2/2',t:'1'},
  60:{s:'√3/2',c:'1/2',t:'√3'},
  90:{s:'1',c:'0',t:'—'},
  120:{s:'√3/2',c:'1/2',t:'√3'},
  135:{s:'√2/2',c:'√2/2',t:'1'},
  150:{s:'1/2',c:'√3/2',t:'√3/3'},
  180:{s:'0',c:'1',t:'0'},
  210:{s:'1/2',c:'√3/2',t:'√3/3'},
  225:{s:'√2/2',c:'√2/2',t:'1'},
  240:{s:'√3/2',c:'1/2',t:'√3'},
  270:{s:'1',c:'0',t:'—'},
  300:{s:'√3/2',c:'1/2',t:'√3'},
  315:{s:'√2/2',c:'√2/2',t:'1'},
  330:{s:'1/2',c:'√3/2',t:'√3/3'},
  360:{s:'0',c:'1',t:'0'}
};

// ── Buttons ──
const btnRow=document.getElementById('btn-row');
[0,30,45,60,90,120,135,150,180,210,225,240,270,300,315,330,360].forEach(a=>{
  const b=document.createElement('button');
  b.textContent=a+'°';b.id='btn'+a;b.onclick=()=>setA(a);
  btnRow.appendChild(b);
});

function toRad(d){return d*Math.PI/180;}
function setA(deg){
  deg=Math.max(0,Math.min(360,Math.round(deg)));
  curDeg=deg;
  document.getElementById('slider').value=deg;
  document.getElementById('num-input').value=deg;
  update(deg);
  document.querySelectorAll('.btn-row button').forEach(b=>b.classList.remove('active-btn'));
  const ab=document.getElementById('btn'+deg);if(ab)ab.classList.add('active-btn');
}
function syncS(v){setA(parseInt(v));}
function syncI(v){const n=parseInt(v);if(!isNaN(n))setA(n);}
function setFT(t){
  fType=t;
  document.getElementById('tbtn-even').classList.toggle('active',t==='even');
  document.getElementById('tbtn-odd').classList.toggle('active',t==='odd');
  update(curDeg);
}

// ── SVG drag ──
const svgEl=document.getElementById('svg');
function angleFromEvt(e){
  const rect=svgEl.getBoundingClientRect();
  const sx=440/rect.width,sy=440/rect.height;
  const cx_=e.touches?e.touches[0].clientX:e.clientX;
  const cy_=e.touches?e.touches[0].clientY:e.clientY;
  const dx=(cx_-rect.left)*sx-CX;
  const dy=CY-(cy_-rect.top)*sy;
  let a=Math.atan2(dy,dx)*180/Math.PI;
  if(a<0)a+=360;
  return Math.round(a);
}
svgEl.addEventListener('pointerdown',e=>{
  dragging=true;svgEl.setPointerCapture(e.pointerId);
  setA(angleFromEvt(e));e.preventDefault();
},{passive:false});
svgEl.addEventListener('pointermove',e=>{
  if(!dragging)return;setA(angleFromEvt(e));e.preventDefault();
},{passive:false});
svgEl.addEventListener('pointerup',()=>dragging=false);
svgEl.addEventListener('pointercancel',()=>dragging=false);

// ── Arc path ──
function arcPath(deg){
  if(deg<=0)return'';
  if(deg>=360)return`M${CX+R} ${CY} A${R} ${R} 0 0 0 ${CX-R} ${CY} A${R} ${R} 0 0 0 ${CX+R} ${CY}`;
  const r=toRad(deg),ex=(CX+R*Math.cos(r)).toFixed(2),ey=(CY-R*Math.sin(r)).toFixed(2);
  return`M${CX+R} ${CY} A${R} ${R} 0 ${deg>180?1:0} 0 ${ex} ${ey}`;
}

// ── Update sign badge ──
function setBadge(id,val,undef){
  const el=document.getElementById(id);
  if(undef){el.textContent='';el.className='fg-sign';return;}
  el.textContent=val>=0?'＋':'－';
  el.className='fg-sign '+(val>=0?'sp':'sn');
}
function setValEl(id,val,undef){
  const el=document.getElementById(id);
  if(undef){el.textContent='無定義';el.className='';return;}
  el.textContent=Math.abs(val).toFixed(3);
  el.className=val>=0?'vp':'vn';
}

// ── Main update ──
function update(deg){
  const rad=toRad(deg);
  const px=CX+R*Math.cos(rad),py=CY-R*Math.sin(rad),fy=CY;
  const onAxis=deg%90===0;

  document.getElementById('arc').setAttribute('d',arcPath(deg));

  // Triangle
  if(!onAxis&&deg>0&&deg<360){
    const op=document.getElementById('tri-op');
    op.setAttribute('x1',CX);op.setAttribute('y1',CY);
    op.setAttribute('x2',px.toFixed(2));op.setAttribute('y2',py.toFixed(2));
    const pf=document.getElementById('tri-pf');
    pf.setAttribute('x1',px.toFixed(2));pf.setAttribute('y1',py.toFixed(2));
    pf.setAttribute('x2',px.toFixed(2));pf.setAttribute('y2',fy);
    op.style.display=pf.style.display='';
    const iR=px>CX,ab=py<CY;
    let rp;
    if(iR&&ab)       rp=`M${px-S} ${fy} L${px-S} ${fy-S} L${px} ${fy-S}`;
    else if(!iR&&ab) rp=`M${px+S} ${fy} L${px+S} ${fy-S} L${px} ${fy-S}`;
    else if(!iR&&!ab)rp=`M${px+S} ${fy} L${px+S} ${fy+S} L${px} ${fy+S}`;
    else             rp=`M${px-S} ${fy} L${px-S} ${fy+S} L${px} ${fy+S}`;
    document.getElementById('ra-mark').setAttribute('d',rp);
    document.getElementById('ra-mark').style.display='';
  } else {
    ['tri-op','tri-pf','ra-mark'].forEach(id=>document.getElementById(id).style.display='none');
  }

  // P position
  ['pt-p','pt-hit'].forEach(id=>{
    document.getElementById(id).setAttribute('cx',px.toFixed(2));
    document.getElementById(id).setAttribute('cy',py.toFixed(2));
  });
  const lP=document.getElementById('lbl-p');
  lP.setAttribute('x',(px+(px>CX?9:-19)).toFixed(1));
  lP.setAttribute('y',(py+(py<CY?-9:17)).toFixed(1));

  // θ label
  const tMid=deg/2,tR=deg<30?R-36:R-32;
  document.getElementById('lbl-theta').setAttribute('x',(CX+tR*Math.cos(toRad(tMid))-6).toFixed(1));
  document.getElementById('lbl-theta').setAttribute('y',(CY-tR*Math.sin(toRad(tMid))+5).toFixed(1));

  // Quadrant & φ
  let quad,phiDeg;
  if(deg<=90){quad=1;phiDeg=deg;}
  else if(deg<=180){quad=2;phiDeg=180-deg;}
  else if(deg<=270){quad=3;phiDeg=deg-180;}
  else{quad=4;phiDeg=360-deg;}
  phiDeg=Math.round(phiDeg*10)/10;
  const phiStr=phiDeg%1===0?phiDeg+'':phiDeg.toFixed(1);

  // φ label
  const pd=quad===1?phiDeg/2:quad===2?180-phiDeg/2:quad===3?180+phiDeg/2:360-phiDeg/2;
  const lPhi=document.getElementById('lbl-phi');
  lPhi.setAttribute('x',(CX+32*Math.cos(toRad(pd))-5).toFixed(1));
  lPhi.setAttribute('y',(CY-32*Math.sin(toRad(pd))+5).toFixed(1));
  lPhi.style.display=(!onAxis&&deg>0&&deg<360)?'':'none';

  // Quad highlight
  for(let i=1;i<=4;i++)document.getElementById('qbox'+i).classList.remove('active');
  document.getElementById('qbox'+quad).classList.add('active');

  document.getElementById('disp-theta').textContent=deg+'°';
  document.getElementById('disp-phi').textContent=phiStr+'°';

  const sinV=Math.sin(rad),cosV=Math.cos(rad),tanV=Math.tan(rad);

  // ── Formula strings ──
  let typeHTML,fmlStr,sFml,cFml,tFml;
  const p=phiStr;

  if(fType==='even'){
    if(quad===1){
      typeHTML='<span class="badge bb">銳角（基本）</span>';
      fmlStr='θ = φ = '+p+'°';
      sFml='sin('+p+'°)';cFml='cos('+p+'°)';tFml='tan('+p+'°)';
    }else if(quad===2){
      typeHTML='<span class="badge be">偶數型 — 180°−φ</span>';
      fmlStr=deg+'° = 180° − '+p+'°';
      sFml='sin('+p+'°)';cFml='−cos('+p+'°)';tFml='−tan('+p+'°)';
    }else if(quad===3){
      typeHTML='<span class="badge be">偶數型 — 180°+φ</span>';
      fmlStr=deg+'° = 180° + '+p+'°';
      sFml='−sin('+p+'°)';cFml='−cos('+p+'°)';tFml='tan('+p+'°)';
    }else{
      typeHTML='<span class="badge be">偶數型 — 360°−φ</span>';
      fmlStr=deg+'° = 360° − '+p+'°';
      sFml='−sin('+p+'°)';cFml='cos('+p+'°)';tFml='−tan('+p+'°)';
    }
  }else{
    // odd type
    let op,ob;
    if(quad===1){
      op=90-deg;ob='90°−'+op+'°';
      typeHTML='<span class="badge bo">奇數型 — 90°−θ</span>';
      fmlStr=deg+'° = '+ob;
      sFml='cos('+op+'°)';cFml='sin('+op+'°)';tFml='cot('+op+'°)';
    }else if(quad===2){
      op=deg-90;ob='90°+'+op+'°';
      typeHTML='<span class="badge bo">奇數型 — 90°+θ</span>';
      fmlStr=deg+'° = '+ob;
      sFml='cos('+op+'°)';cFml='−sin('+op+'°)';tFml='−cot('+op+'°)';
    }else if(quad===3){
      op=270-deg;ob='270°−'+op+'°';
      typeHTML='<span class="badge bo">奇數型 — 270°−θ</span>';
      fmlStr=deg+'° = '+ob;
      sFml='−cos('+op+'°)';cFml='−sin('+op+'°)';tFml='cot('+op+'°)';
    }else{
      op=deg-270;ob='270°+'+op+'°';
      typeHTML='<span class="badge bo">奇數型 — 270°+θ</span>';
      fmlStr=deg+'° = '+ob;
      sFml='−cos('+op+'°)';cFml='sin('+op+'°)';tFml='−cot('+op+'°)';
    }
  }

  document.getElementById('disp-type').innerHTML=typeHTML;
  document.getElementById('disp-fml').textContent=fmlStr;

  document.getElementById('fl-sin').textContent='sin('+deg+'°)';
  document.getElementById('ff-sin').textContent=sFml;
  setBadge('fs-sin',sinV);setValEl('fv-sin',sinV);

  document.getElementById('fl-cos').textContent='cos('+deg+'°)';
  document.getElementById('ff-cos').textContent=cFml;
  setBadge('fs-cos',cosV);setValEl('fv-cos',cosV);

  const tanUndef=deg%90===0&&deg%180!==0;
  document.getElementById('fl-tan').textContent='tan('+deg+'°)';
  document.getElementById('ff-tan').textContent=tFml;
  setBadge('fs-tan',tanV,tanUndef);setValEl('fv-tan',tanV,tanUndef);

  // Exact fractions (absolute)
  const ex=ABS[deg];
  document.getElementById('fe-sin').textContent=ex?ex.s:'';
  document.getElementById('fe-cos').textContent=ex?ex.c:'';
  document.getElementById('fe-tan').textContent=tanUndef?'':ex?ex.t:'';
}

setA(45);
setTimeout(setSvgSize,100);
</script>
</body>
</html>
